version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: zina-postgres
    environment:
      POSTGRES_USER: zina
      POSTGRES_PASSWORD: zina_dev_password
      POSTGRES_DB: zina
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zina"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
